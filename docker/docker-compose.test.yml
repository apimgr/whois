version: '3.8'

services:
  caswhois:
    # Testing: Build from source
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VERSION: test
        COMMIT_ID: test
        BUILD_DATE: ${BUILD_DATE:-unknown}
        OFFICIAL_SITE: https://github.com/apimgr/whois
    container_name: caswhois-test
    
    # Random test port
    ports:
      - "64581:80"
    
    # No persistent volumes (ephemeral)
    tmpfs:
      - /config
      - /data

    # Development mode + debug (the binary reads flags, not MODE/DEBUG env)
    command: ["--mode", "development", "--debug"]

    # Environment variables (the binary reads DATABASE_DIR/DATABASE_URL/DATABASE_DRIVER)
    environment:
      TZ: America/New_York
      # Ephemeral SQLite database under the tmpfs-backed /data
      DATABASE_DIR: /data/db

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/server/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    # Network
    networks:
      - caswhois-test-network

networks:
  caswhois-test-network:
    driver: bridge
