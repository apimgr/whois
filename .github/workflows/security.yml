name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Scan for hardcoded credentials
        run: |
          set -euo pipefail
          PATTERN='(api[_-]?key|secret|password|passwd|token|private[_-]?key|aws_access_key_id|aws_secret_access_key)[[:space:]]*[:=][[:space:]]*["'"'"']?[A-Za-z0-9/+_-]{16,}'
          MATCHES=$(grep -rInE "$PATTERN" --include='*.go' --include='*.yml' --include='*.yaml' --include='*.json' \
            --exclude='*_test.go' --exclude-dir=.git --exclude-dir=vendor . || true)
          if [ -n "$MATCHES" ]; then
            echo "Potential hardcoded secret(s) found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No hardcoded secrets detected."
      - name: Reject committed .env files
        run: |
          set -euo pipefail
          ENV_FILES=$(find . -path ./.git -prune -o -name '.env' -print -o -name '*.env' -print || true)
          if [ -n "$ENV_FILES" ]; then
            echo "Committed .env file(s) found (forbidden):"
            echo "$ENV_FILES"
            exit 1
          fi
          echo "No committed .env files."

  workflow-sha-policy:
    name: Workflow SHA Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Enforce SHA-pinned third-party Actions
        run: |
          set -euo pipefail
          VIOLATIONS=$(grep -rInE '^[[:space:]]*uses:[[:space:]]*[^@]+@[^[:space:]]+' .github/workflows \
            | grep -vE '@[0-9a-f]{40}([[:space:]]|$)' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "Third-party Actions must be pinned to a full 40-char commit SHA:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "All Actions are SHA-pinned."

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    permissions:
      contents: read
    env:
      CGO_ENABLED: "0"
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Vulnerability scan (govulncheck)
        run: |
          set -euo pipefail
          PROJECTORG="${{ github.repository_owner }}"
          PROJECTNAME="${{ github.event.repository.name }}"
          mkdir -p "/tmp/${PROJECTORG}"
          TMPDIR=$(mktemp -d "/tmp/${PROJECTORG}/${PROJECTNAME}-XXXXXX")
          GOBIN="${TMPDIR}/bin" go install golang.org/x/vuln/cmd/govulncheck@latest
          "${TMPDIR}/bin/govulncheck" ./...

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    permissions:
      contents: read
    env:
      CGO_ENABLED: "0"
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Reject copyleft licenses
        run: |
          set -euo pipefail
          PROJECTORG="${{ github.repository_owner }}"
          PROJECTNAME="${{ github.event.repository.name }}"
          mkdir -p "/tmp/${PROJECTORG}"
          TMPDIR=$(mktemp -d "/tmp/${PROJECTORG}/${PROJECTNAME}-XXXXXX")
          GOBIN="${TMPDIR}/bin" go install github.com/google/go-licenses@latest
          REPORT="${TMPDIR}/licenses.csv"
          "${TMPDIR}/bin/go-licenses" report ./... > "$REPORT" 2>/dev/null || true
          FORBIDDEN=$(grep -iE '(GPL|LGPL|AGPL)' "$REPORT" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "Forbidden copyleft license(s) detected:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "No GPL/LGPL/AGPL dependencies detected."
