name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: go vet ./...
      - run: staticcheck ./...

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run tests with coverage
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p "/tmp/${REPO_OWNER}"
          COVDIR=$(mktemp -d "/tmp/${REPO_OWNER}/${REPO_NAME}-XXXXXX")
          echo "COVDIR=$COVDIR" >> "$GITHUB_ENV"
          go test -cover -coverprofile="$COVDIR/coverage.out" ./...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=60
          PCT=$(go tool cover -func="$COVDIR/coverage.out" | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi

  build:
    if: github.event_name != 'schedule'
    needs: [lint, test]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: go build -buildvcs=false ./...

  vuln-check:
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: govulncheck ./...
